<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/logos/logo-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/logos/logo-icon.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/assets/logos/logo-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/logos/logo-icon.png" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Theme & App Identity -->
    <meta name="theme-color" content="#f59e0b" />
    <meta name="apple-mobile-web-app-title" content="PipingBox" />
    <meta name="application-name" content="PipingBox" />
    <meta name="msapplication-TileColor" content="#0d0d0d" />

    <!-- Primary Meta Tags -->
    <title>%VITE_APP_TITLE%</title>
    <meta name="title" content="%VITE_APP_TITLE%" />
    <meta name="description" content="%VITE_APP_DESCRIPTION%" />
    <meta name="author" content="PipingBox" />

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://app.pipingbox.com/" />
    <meta property="og:title" content="PipingBox" />
    <meta property="og:description" content="Formación, herramientas, empleo, certificaciones y comunidad para profesionales y empresas del sector industrial." />
    <meta property="og:image" content="https://app.pipingbox.com/assets/logos/logo-horizontal.png" />
    <meta property="og:site_name" content="PipingBox" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://app.pipingbox.com/" />
    <meta name="twitter:title" content="PipingBox" />
    <meta name="twitter:description" content="Formación, herramientas, empleo, certificaciones y comunidad para profesionales y empresas del sector industrial." />
    <meta name="twitter:image" content="https://app.pipingbox.com/assets/logos/logo-horizontal.png" />

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-V04RD9W0J4"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-V04RD9W0J4');
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
